<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Analysis</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
  /* ── Nav sidebar ── */
  .outer { display: flex; flex: 1; overflow: hidden; }
  .nav-sb { width: 200px; min-width: 200px; background: #161b22; display: flex; flex-direction: column; border-right: 0.5px solid rgba(255,255,255,0.06); overflow: hidden; flex-shrink: 0; }
  .nav-sb .sb-logo { display: flex; align-items: center; gap: 9px; padding: 13px 16px 11px; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
  .nav-sb .sb-logo-icon { font-size: 18px; }
  .nav-sb .sb-logo-text { font-size: 14px; font-weight: 500; color: #e6edf3; flex: 1; }
  .nav-sb .sb-nav { flex: 1; padding: 6px 0 2px; overflow-y: auto; }
  .nav-sb .sb-nav::-webkit-scrollbar { width: 0; }
  .nav-sb .sec-label { font-size: 9.5px; font-weight: 500; color: rgba(230,237,243,0.22); text-transform: uppercase; letter-spacing: .09em; padding: 10px 16px 4px; }
  .nav-sb .ni { display: flex; align-items: center; gap: 9px; padding: 7px 16px; cursor: pointer; color: rgba(230,237,243,0.4); font-size: 12.5px; position: relative; transition: background .1s, color .1s; }
  .nav-sb .ni:hover { background: rgba(88,166,255,0.06); color: rgba(230,237,243,0.75); }
  .nav-sb .ni.active { background: rgba(88,166,255,0.1); color: #e6edf3; }
  .nav-sb .ni.active::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px; background: #58a6ff; border-radius: 0 2px 2px 0; }
  .nav-sb .ni i { font-size: 15px; width: 16px; flex-shrink: 0; }
  .nav-sb .ni-label { flex: 1; }
  .nav-sb .ndiv { height: 0.5px; background: rgba(255,255,255,0.05); margin: 5px 14px; }
  /* ── Header ── */
  header { padding: 10px 20px 8px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
  .badge { font-size: 11px; background: #21262d; padding: 3px 8px; border-radius: 12px; color: #8b949e; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; gap: 3px; align-items: center; }
  .filter-group-label { font-size: 10px; color: #8b949e; padding-right: 3px; white-space: nowrap; }
  .filter-sep { width: 1px; height: 16px; background: #30363d; margin: 0 4px; flex-shrink: 0; }
  .filter-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 3px 9px; border-radius: 5px; cursor: pointer; font-size: 11px; }
  .filter-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  /* ── Layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-search { padding: 10px 12px; border-bottom: 1px solid #30363d; }
  .sidebar-search input { width: 100%; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 6px 10px; font-size: 12px; outline: none; }
  .trade-list { overflow-y: auto; flex: 1; }
  .trade-row { padding: 8px 14px; cursor: pointer; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; transition: background .1s; }
  .trade-row:hover { background: #161b22; }
  .trade-row.selected { background: #1f3a5f; border-left: 3px solid #58a6ff; }
  .trade-row.win  .pnl { color: #3fb950; }
  .trade-row.loss .pnl { color: #f85149; }
  .trade-meta { font-size: 12px; color: #8b949e; }
  .trade-meta strong { color: #e6edf3; }
  .tipo-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; margin-left: 3px; }
  .tipo-long   { background: #1a3d2e; color: #3fb950; }
  .tipo-short  { background: #3d1a1a; color: #f85149; }
  .par-eurusd  { background: #1a2d3d; color: #58a6ff; }
  .par-xauusd  { background: #3d2b1a; color: #f0883e; }
  .cta-ftmo    { background: #1a2d1a; color: #3fb950; }
  .cta-exness  { background: #2a1a3d; color: #bc8cff; }
  .cta-backtest{ background: #21262d; color: #8b949e; }
  .pnl { font-size: 13px; font-weight: 600; }
  /* ── Detail ── */
  .detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .detail-header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
  .detail-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .why-box { padding: 10px 20px; background: #0d1117; border-bottom: 1px solid #30363d; flex-shrink: 0; display: flex; gap: 20px; flex-wrap: wrap; }
  .why-item { font-size: 12px; }
  .why-item .label { color: #8b949e; margin-bottom: 2px; }
  .why-item .value { color: #e6edf3; font-weight: 500; }
  .why-item .value.bull { color: #3fb950; }
  .why-item .value.bear { color: #f85149; }
  .why-item .value.ok   { color: #3fb950; }
  .why-item .value.weak { color: #d29922; }
  .charts-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; gap: 1px; background: #30363d; }
  .chart-wrap { flex: 1; display: flex; flex-direction: column; background: #0d1117; overflow: hidden; }
  .chart-label { font-size: 11px; color: #8b949e; padding: 6px 12px; background: #161b22; border-bottom: 1px solid #30363d; }
  .chart-div { flex: 1; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #8b949e; font-size: 14px; flex-direction: column; gap: 8px; }
  .empty-state span { font-size: 32px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>📊 Trade Analysis</h1>
    <span class="badge" id="total-badge">0 trades</span>
  </div>
  <div class="filters">
    <div class="filter-group">
      <span class="filter-group-label">Resultado</span>
      <button class="filter-btn active" data-ft="result" data-fv="all">Todos</button>
      <button class="filter-btn" data-ft="result" data-fv="WIN">WIN</button>
      <button class="filter-btn" data-ft="result" data-fv="LOSS">LOSS</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <span class="filter-group-label">Dirección</span>
      <button class="filter-btn active" data-ft="tipo" data-fv="all">Todos</button>
      <button class="filter-btn" data-ft="tipo" data-fv="LONG">LONG</button>
      <button class="filter-btn" data-ft="tipo" data-fv="SHORT">SHORT</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <span class="filter-group-label">Par</span>
      <button class="filter-btn active" data-ft="par" data-fv="all">Todos</button>
      <button class="filter-btn" data-ft="par" data-fv="EURUSD">EURUSD</button>
      <button class="filter-btn" data-ft="par" data-fv="XAUUSD">XAUUSD</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <span class="filter-group-label">Cuenta</span>
      <button class="filter-btn active" data-ft="cuenta" data-fv="all">Todos</button>
      <button class="filter-btn" data-ft="cuenta" data-fv="FTMO">FTMO</button>
      <button class="filter-btn" data-ft="cuenta" data-fv="EXNESS">EXNESS</button>
    </div>
  </div>
</header>
<div class="outer">
<div class="nav-sb">
  <div class="sb-logo">
    <span class="sb-logo-icon">📈</span>
    <span class="sb-logo-text">TradingBot</span>
  </div>
  <div class="sb-nav">
    <div class="sec-label">Principal</div>
    <div class="ni" onclick="location.href='index.html'">
      <i class="ti ti-layout-dashboard"></i><span class="ni-label">Dashboard</span>
    </div>
    <div class="ndiv"></div>
    <div class="sec-label">Análisis</div>
    <div class="ni" onclick="location.href='backtest.html'">
      <i class="ti ti-chart-histogram"></i><span class="ni-label">Backtest</span>
    </div>
    <div class="ni active" onclick="location.href='trade_analysis.html'">
      <i class="ti ti-list-search"></i><span class="ni-label">Análisis Trades</span>
    </div>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Buscar por fecha (ej: 2025-03)…">
    </div>
    <div class="trade-list" id="trade-list"></div>
  </div>
  <div class="detail" id="detail">
    <div class="empty-state">
      <span>📈</span>
      <div>Seleccioná un trade para ver el análisis</div>
    </div>
  </div>
</div>
</div>

// ── Chart instances ────────────────────────────────────────────────────────
let chartH4 = null, chartM15 = null;
let seriesH4 = null, seriesM15 = null;
let ema9Series = null, ema21Series = null;
let currentFilters = { result: 'all', tipo: 'all', par: 'all', cuenta: 'all' };
let currentSearch = '';

function createCharts() {
  const h4div  = document.getElementById('chart-h4');
  const m15div = document.getElementById('chart-m15');
  if (!h4div || !m15div) return;

  const opts = {
    autoSize:  true,
    layout:    { background: { color: '#0d1117' }, textColor: '#8b949e' },
    grid:      { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: 1 },
    rightPriceScale: {
      borderColor:   '#30363d',
      visible:       true,
      borderVisible: true,
      ticksVisible:  true,
      scaleMargins:  { top: 0.08, bottom: 0.08 },
    },
    timeScale: { borderColor: '#30363d', timeVisible: true, secondsVisible: false },
  };

  chartH4  = LightweightCharts.createChart(h4div,  { ...opts });
  chartM15 = LightweightCharts.createChart(m15div, { ...opts });

  seriesH4 = chartH4.addCandlestickSeries({
    upColor: '#3fb950', downColor: '#f85149',
    borderUpColor: '#3fb950', borderDownColor: '#f85149',
    wickUpColor: '#3fb950', wickDownColor: '#f85149',
  });
  ema9Series = chartH4.addLineSeries({
    color: '#f0883e', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false,
  });
  ema21Series = chartH4.addLineSeries({
    color: '#58a6ff', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false,
  });

  seriesM15 = chartM15.addCandlestickSeries({
    upColor: '#3fb950', downColor: '#f85149',
    borderUpColor: '#3fb950', borderDownColor: '#f85149',
    wickUpColor: '#3fb950', wickDownColor: '#f85149',
  });
}

function destroyCharts() {
  if (chartH4)  { chartH4.remove();  chartH4  = null; }
  if (chartM15) { chartM15.remove(); chartM15 = null; }
  seriesH4 = seriesM15 = ema9Series = ema21Series = null;
}

// ── Render trade detail ────────────────────────────────────────────────────
function renderDetail(t) {
  const pnlSign  = t.pnl >= 0 ? '+' : '';
  const pnlColor = t.pnl >= 0 ? '#3fb950' : '#f85149';
  const resTag   = t.resultado === 'WIN'
    ? '<span style="color:#3fb950">✅ WIN</span>'
    : '<span style="color:#f85149">❌ LOSS</span>';

  const tendClass  = t.tendencia && t.tendencia.includes('↑') ? 'bull' : 'bear';
  const adxClass   = t.adx !== null && t.adx >= 25 ? 'ok' : 'weak';
  const fuenteTag  = t.fuente === 'live' ? '🔴 live' : '📁 backtest';
  const tipoColor  = t.tipo === 'LONG' ? '#3fb950' : '#f85149';
  const parClass   = t.par === 'XAUUSD' ? 'par-xauusd' : 'par-eurusd';
  const ctaClass   = t.cuenta === 'FTMO' ? 'cta-ftmo' : (t.cuenta === 'EXNESS' ? 'cta-exness' : 'cta-backtest');
  const dec        = t.par === 'XAUUSD' ? 2 : 5;
  const pipLabel   = t.par === 'XAUUSD' ? 'ticks' : 'pips';

  const why = `
    <div class="why-item">
      <div class="label">Tendencia H4 (EMA9/21)</div>
      <div class="value ${tendClass}">${t.tendencia || '?'}${
        t.ema9 ? ` &nbsp; EMA9: ${t.ema9.toFixed(dec)}  EMA21: ${t.ema21.toFixed(dec)}` : ''}</div>
    </div>
    <div class="why-item">
      <div class="label">ADX (M15, umbral 25)</div>
      <div class="value ${adxClass}">${t.adx !== null ? t.adx.toFixed(1) : '?'} ${
        t.adx !== null && t.adx >= 25 ? '✓ momentum fuerte' : '✗ momentum débil'}</div>
    </div>
    <div class="why-item">
      <div class="label">ATR → SL / TP</div>
      <div class="value">${t.atr !== null ? t.atr.toFixed(dec) : '?'}
        ${t.sl_pips ? `→ SL ${t.sl_pips} ${pipLabel}` : ''}
        ${t.tp_pips ? `· TP ${t.tp_pips} ${pipLabel}` : ''}</div>
    </div>
    <div class="why-item">
      <div class="label">Entrada / Salida</div>
      <div class="value">${t.entrada.toFixed(dec)} → ${t.salida.toFixed(dec)}
        &nbsp; <span style="color:${pnlColor}">${pnlSign}$${Math.abs(t.pnl).toFixed(2)}</span></div>
    </div>
    <div class="why-item">
      <div class="label">Fuente</div>
      <div class="value">${fuenteTag}</div>
    </div>`;

  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">
        Trade #${t.id}
        <span class="tipo-badge ${parClass}">${t.par || 'EURUSD'}</span>
        <span class="tipo-badge ${ctaClass}">${t.cuenta || ''}</span>
        <span style="color:${tipoColor}">${t.tipo}</span>
        ${resTag}
        <span style="color:#8b949e;font-size:12px;font-weight:400">${t.open_time} UTC</span>
      </div>
    </div>
    <div class="why-box">${why}</div>
    <div class="charts-container">
      <div class="chart-wrap">
        <div class="chart-label">📊 ${t.par || 'EURUSD'} H4 — Tendencia Macro &nbsp;
          <span style="color:#f0883e">━ EMA 9</span> &nbsp;
          <span style="color:#58a6ff">━ EMA 21</span>
        </div>
        <div class="chart-div" id="chart-h4"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-label">⚡ ${t.par || 'EURUSD'} M15 — Trigger &amp; Ejecución &nbsp;
          <span style="color:#f85149">― SL ${t.sl ? t.sl.toFixed(dec) : ''}</span> &nbsp;
          <span style="color:#3fb950">― TP ${t.tp ? t.tp.toFixed(dec) : ''}</span>
        </div>
        <div class="chart-div" id="chart-m15"></div>
      </div>
    </div>`;

  destroyCharts();
  createCharts();

  if (seriesH4 && t.h4_bars.length) {
    seriesH4.setData(t.h4_bars);
    if (t.h4_ema9.length)  ema9Series.setData(t.h4_ema9);
    if (t.h4_ema21.length) ema21Series.setData(t.h4_ema21);
    seriesH4.setMarkers([{
      time:     t.entry_ts,
      position: t.tipo === 'LONG' ? 'belowBar' : 'aboveBar',
      color:    t.tipo === 'LONG' ? '#3fb950'  : '#f85149',
      shape:    t.tipo === 'LONG' ? 'arrowUp'  : 'arrowDown',
      text:     'Entrada',
    }]);
    chartH4.timeScale().fitContent();
  }

  if (seriesM15 && t.m15_bars.length) {
    seriesM15.setData(t.m15_bars);
    if (t.sl) seriesM15.createPriceLine({
      price: t.sl, color: '#f85149', lineWidth: 1,
      lineStyle: 2, axisLabelVisible: true, title: 'SL',
    });
    if (t.tp) seriesM15.createPriceLine({
      price: t.tp, color: '#3fb950', lineWidth: 1,
      lineStyle: 2, axisLabelVisible: true, title: 'TP',
    });
    seriesM15.setMarkers([{
      time:     t.entry_ts,
      position: t.tipo === 'LONG' ? 'belowBar' : 'aboveBar',
      color:    t.tipo === 'LONG' ? '#3fb950'  : '#f85149',
      shape:    t.tipo === 'LONG' ? 'arrowUp'  : 'arrowDown',
      text:     'Entrada',
    }]);
    chartM15.timeScale().fitContent();
  }
}

// ── Render list ────────────────────────────────────────────────────────────
function filteredTrades() {
  const { result, tipo, par, cuenta } = currentFilters;
  return TRADES.filter(t =>
       (result  === 'all' || t.resultado === result)
    && (tipo    === 'all' || t.tipo      === tipo)
    && (par     === 'all' || t.par       === par)
    && (cuenta  === 'all' || t.cuenta    === cuenta)
    && (!currentSearch || t.open_time.includes(currentSearch) || t.id.includes(currentSearch))
  );
}

function renderList() {
  const list  = document.getElementById('trade-list');
  const items = filteredTrades();
  document.getElementById('total-badge').textContent =
    `${items.length} de ${TRADES.length} trades`;

  list.innerHTML = items.map((t, i) => {
    const pnlSign   = t.pnl >= 0 ? '+' : '';
    const tipoClass = t.tipo === 'LONG' ? 'tipo-long' : 'tipo-short';
    const rowClass  = t.resultado === 'WIN' ? 'win' : 'loss';
    const parClass  = t.par === 'XAUUSD' ? 'par-xauusd' : 'par-eurusd';
    const ctaClass  = t.cuenta === 'FTMO' ? 'cta-ftmo' : (t.cuenta === 'EXNESS' ? 'cta-exness' : 'cta-backtest');
    return `<div class="trade-row ${rowClass}" data-idx="${i}" onclick="selectTrade(${i})">
      <div>
        <div class="trade-meta">
          <strong>#${t.id}</strong>
          <span class="tipo-badge ${tipoClass}">${t.tipo}</span>
          <span class="tipo-badge ${parClass}">${t.par || 'EURUSD'}</span>
          <span class="tipo-badge ${ctaClass}">${t.cuenta || ''}</span>
        </div>
        <div class="trade-meta" style="margin-top:3px">${t.open_time.slice(0,16)}</div>
      </div>
      <div class="pnl">${pnlSign}$${Math.abs(t.pnl).toFixed(2)}</div>
    </div>`;
  }).join('');
}

function selectTrade(filteredIdx) {
  const t = filteredTrades()[filteredIdx];
  if (!t) return;
  document.querySelectorAll('.trade-row').forEach((r, i) => {
    r.classList.toggle('selected', i === filteredIdx);
  });
  renderDetail(t);
}

// ── Filtros ────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.ft;
    const val  = btn.dataset.fv;
    document.querySelectorAll(`.filter-btn[data-ft="${type}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilters[type] = val;
    renderList();
  });
});
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  renderList();
});

// ── Init ───────────────────────────────────────────────────────────────────
renderList();
if (TRADES.length > 0) selectTrade(0);
</script>
